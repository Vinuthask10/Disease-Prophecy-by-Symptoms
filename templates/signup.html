<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>

<body>
<div class="auth-box">
<h4>Create Account</h4>

<form method="POST">
<input type="text" class="form-control mb-3" placeholder="Username" required>
<input type="email" class="form-control mb-3" placeholder="Email" required>
<input type="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-success w-100">Signup</button>
</form>

<p class="mt-3">Already have an account?
<a href="{{ url_for('login') }}">Login</a></p>
</div>
</body>
</html>
